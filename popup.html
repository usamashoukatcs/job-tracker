<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 360px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  color: #1e293b;
  background: #f8fafc;
}

.header {
  background: #2563eb;
  color: #fff;
  padding: 14px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 8px; }
.logo { font-size: 20px; }
.brand { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
.header-actions { display: flex; gap: 6px; }
.icon-btn {
  background: rgba(255,255,255,.18);
  border: none;
  color: #fff;
  border-radius: 6px;
  padding: 5px 9px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: background .15s;
}
.icon-btn:hover { background: rgba(255,255,255,.3); }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
}
.stat {
  text-align: center;
  padding: 10px 4px;
  border-right: 1px solid #e2e8f0;
}
.stat:last-child { border-right: none; }
.stat-num {
  font-size: 18px;
  font-weight: 700;
  line-height: 1;
  color: #1e293b;
}
.stat-label {
  font-size: 10px;
  color: #64748b;
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.stat-num.green { color: #16a34a; }
.stat-num.red { color: #dc2626; }
.stat-num.orange { color: #d97706; }

.section-title {
  padding: 10px 14px 6px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: #64748b;
}

.job-list { background: #fff; border-top: 1px solid #e2e8f0; }

.job-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid #f1f5f9;
  cursor: default;
}
.job-item:last-child { border-bottom: none; }

.job-avatar {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: #dbeafe;
  color: #2563eb;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}

.job-info { flex: 1; min-width: 0; }
.job-title {
  font-weight: 600;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.job-company { font-size: 11px; color: #64748b; margin-top: 1px; }
.job-meta { font-size: 10px; color: #94a3b8; margin-top: 2px; }

.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: .3px;
}
.badge-applied { background: #dbeafe; color: #1d4ed8; }
.badge-interview { background: #dcfce7; color: #15803d; }
.badge-rejected { background: #fee2e2; color: #b91c1c; }
.badge-offer { background: #fef3c7; color: #b45309; }
.badge-ghosted { background: #f1f5f9; color: #475569; }

.empty {
  text-align: center;
  padding: 24px 16px;
  color: #94a3b8;
}
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.empty-text { font-size: 13px; }
.empty-sub { font-size: 11px; margin-top: 4px; color: #cbd5e1; }

.footer {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  background: #fff;
  border-top: 1px solid #e2e8f0;
}
.footer-btn {
  flex: 1;
  padding: 8px;
  border: 1.5px solid #e2e8f0;
  background: #fff;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  color: #475569;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
}
.footer-btn:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
.footer-btn.primary {
  background: #2563eb;
  color: #fff;
  border-color: #2563eb;
}
.footer-btn.primary:hover { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }

.followup-banner {
  background: #fffbeb;
  border-bottom: 1px solid #fde68a;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #92400e;
}
.followup-banner span { flex: 1; }
.followup-link {
  font-size: 11px;
  color: #b45309;
  font-weight: 600;
  cursor: pointer;
  text-decoration: underline;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">💼</div>
    <div class="brand">JobTracker</div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="addBtn">+ Add</button>
    <button class="icon-btn" id="settingsBtn">⚙</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="statApplied">0</div><div class="stat-label">Applied</div></div>
  <div class="stat"><div class="stat-num green" id="statInterview">0</div><div class="stat-label">Interview</div></div>
  <div class="stat"><div class="stat-num orange" id="statOffer">0</div><div class="stat-label">Offer</div></div>
  <div class="stat"><div class="stat-num red" id="statRejected">0</div><div class="stat-label">Rejected</div></div>
</div>

<div id="followupBanner" style="display:none" class="followup-banner">
  <span>⏰ <strong id="followupCount">0</strong> follow-up(s) overdue</span>
  <span class="followup-link" id="followupLink">View →</span>
</div>

<div class="section-title">Recent Applications</div>

<div class="job-list" id="jobList">
  <div class="empty">
    <div class="empty-icon">📋</div>
    <div class="empty-text">No jobs tracked yet</div>
    <div class="empty-sub">Apply to a job and it'll appear here</div>
  </div>
</div>

<div class="footer">
  <button class="footer-btn" id="dashBtn">📊 Dashboard</button>
  <button class="footer-btn primary" id="addBtn2">+ Add Job</button>
</div>

<script src="popup.js"></script>
</body>
</html>
